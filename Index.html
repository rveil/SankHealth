document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\">\n        <div style=\"font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:600;\">Année<\u002Fdiv>\n        <div style=\"display:flex; gap:5px;\">\n          <sc-for list=\"{{ yearChips }}\" as=\"c\" hint-placeholder-count=\"3\"><button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:4px; align-items:flex-end;\">\n        <div style=\"font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:600;\">Style<\u002Fdiv>\n        <div style=\"display:flex; gap:5px;\">\n          <sc-for list=\"{{ themeChips }}\" as=\"c\" hint-placeholder-count=\"2\"><button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"display:flex; background:var(--panel); border-bottom:1px solid var(--line);\">\n    <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n      <div style=\"{{ k.style }}\">\n        <div style=\"font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600;\">{{ k.label }}<\u002Fdiv>\n        <div class=\"hf-num\" style=\"font-family:'Spectral',serif; font-weight:600; font-size:19px; color:var(--ink); line-height:1.1; margin-top:2px;\">{{ k.value }}<\u002Fdiv>\n        <div style=\"font-size:11px; color:var(--muted); margin-top:1px;\">{{ k.sub }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:10px 22px; padding:9px 24px; background:var(--bg2); border-bottom:1px solid var(--line);\">\n    <div style=\"display:flex; align-items:center; gap:8px;\">\n      <span style=\"font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); font-weight:700;\">Périmètre<\u002Fspan>\n      <div style=\"display:flex; gap:5px;\"><sc-for list=\"{{ perimChips }}\" as=\"c\" hint-placeholder-count=\"3\"><button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:8px;\">\n      <span style=\"font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); font-weight:700;\">Couleurs<\u002Fspan>\n      <div style=\"display:flex; gap:5px; flex-wrap:wrap;\"><sc-for list=\"{{ colorChips }}\" as=\"c\" hint-placeholder-count=\"3\"><button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:8px;\">\n      <span style=\"font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); font-weight:700;\">Détails<\u002Fspan>\n      <div style=\"display:flex; gap:5px;\"><sc-for list=\"{{ detailChips }}\" as=\"c\" hint-placeholder-count=\"3\"><button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n    <\u002Fdiv>\n    <button onclick=\"{{ resetAll }}\" style=\"margin-left:auto; font-family:'Public Sans'; font-size:12px; font-weight:600; color:var(--muted); background:transparent; border:1px solid var(--line); border-radius:7px; padding:6px 12px; cursor:pointer;\">↺ Réinitialiser<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:10px 22px; padding:8px 24px; background:var(--bg2); border-bottom:1px solid var(--line);\">\n    <div style=\"display:flex; align-items:center; gap:8px;\">\n      <span style=\"font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:700;\">Financeur<\u002Fspan>\n      <div style=\"display:flex; gap:5px; flex-wrap:wrap;\"><sc-for list=\"{{ finChips }}\" as=\"c\" hint-placeholder-count=\"4\"><button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:8px;\">\n      <span style=\"font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:700;\">Destination<\u002Fspan>\n      <div style=\"display:flex; gap:5px; flex-wrap:wrap;\"><sc-for list=\"{{ destChips }}\" as=\"c\" hint-placeholder-count=\"6\"><button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:8px;\">\n      <span style=\"font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:700;\">Profession<\u002Fspan>\n      <select onchange=\"{{ onProfession }}\" value=\"{{ professionValue }}\" style=\"font-family:'Public Sans',sans-serif; font-size:12px; font-weight:600; color:var(--ink); background:var(--chip); border:1px solid var(--line); border-radius:7px; padding:5px 9px; cursor:pointer; max-width:280px;\">\n        <option value=\"\">Toutes les professions<\u002Foption>\n        <sc-for list=\"{{ professionOptions }}\" as=\"o\" hint-placeholder-count=\"6\"><option value=\"{{ o.id }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n      <\u002Fselect>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ perimBanner }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:7px 24px; background:var(--accentSoft); border-bottom:1px solid var(--line); font-size:12px; color:var(--ink);\"><strong style=\"color:var(--accent);\">{{ perimBanner.title }}<\u002Fstrong> · {{ perimBanner.note }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div ref=\"{{ containerRef }}\" style=\"position:relative; flex:1 1 auto; min-height:520px; overflow:hidden; background:var(--bg);\">\n    {{ diagram }}\n    <div style=\"position:absolute; left:14px; bottom:12px; font-size:11px; color:var(--muted); pointer-events:none; background:var(--panelT); padding:4px 9px; border-radius:7px; border:1px solid var(--line);\">Molette : zoom · glisser le fond : déplacer · glisser un nœud : réordonner · survol : montants des connecteurs<\u002Fdiv>\n    <sc-if value=\"{{ hoverTip }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; right:14px; top:12px; font-size:12px; color:var(--ink); background:var(--panel); padding:8px 12px; border-radius:8px; border:1px solid var(--line); box-shadow:0 6px 20px rgba(0,0,0,.12); pointer-events:none; max-width:300px;\">\n        <div style=\"font-weight:700; margin-bottom:2px;\">{{ hoverTip.name }}<\u002Fdiv>\n        <div class=\"hf-num\"><span style=\"color:var(--accent); font-weight:700;\">{{ hoverTip.value }}<\u002Fspan> <span style=\"color:var(--muted);\">{{ hoverTip.sub }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:7px 16px; padding:10px 24px; background:var(--bg2); border-top:1px solid var(--line);\">\n    <span style=\"font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); font-weight:800; border:1px solid var(--accent); border-radius:6px; padding:3px 8px;\">Légende<\u002Fspan>\n    <span style=\"font-size:11.5px; color:var(--muted); font-weight:600;\">{{ legendTitle }} :<\u002Fspan>\n    <sc-for list=\"{{ legend }}\" as=\"g\" hint-placeholder-count=\"6\">\n      <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--ink); font-weight:500;\"><span style=\"{{ g.swatch }}\"><\u002Fspan>{{ g.label }}<\u002Fspan>\n    <\u002Fsc-for>\n    <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--ink);\"><span style=\"width:18px; height:12px; border-radius:3px; background-image:repeating-linear-gradient(45deg, var(--muted) 0 1.5px, transparent 1.5px 4px); border:1px solid var(--line);\"><\u002Fspan>estimation<\u002Fspan>\n    <span style=\"margin-left:auto; font-size:11px; color:var(--muted); max-width:480px; text-align:right;\">{{ methodo }}<\u002Fspan>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ fiche }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeFiche }}\" style=\"position:fixed; inset:0; background:rgba(15,20,28,.45); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; z-index:50; padding:24px;\">\n      <div onclick=\"{{ stop }}\" style=\"width:min(560px,100%); max-height:84vh; overflow:auto; background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:0 30px 80px rgba(0,0,0,.4);\">\n        <div style=\"padding:20px 24px 14px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--panel);\">\n          <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:16px;\">\n            <div>\n              <div style=\"display:flex; align-items:center; gap:9px;\">\n                <span style=\"{{ fiche.dot }}\"><\u002Fspan>\n                <span style=\"font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700;\">{{ fiche.kind }}<\u002Fspan>\n                <span style=\"font-size:10px; font-weight:700; color:var(--accent); border:1px solid var(--accent); border-radius:20px; padding:1px 8px;\">ESTIMATION<\u002Fspan>\n              <\u002Fdiv>\n              <h2 style=\"font-family:'Spectral',serif; font-weight:700; font-size:21px; margin:6px 0 0; color:var(--ink); line-height:1.15;\">{{ fiche.title }}<\u002Fh2>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeFiche }}\" style=\"flex:none; width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--bg2); color:var(--ink); font-size:18px; cursor:pointer; line-height:1;\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:22px; margin-top:14px;\">\n            <div><div style=\"font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600;\">Montant constaté<\u002Fdiv><div class=\"hf-num\" style=\"font-family:'Spectral',serif; font-weight:700; font-size:23px; color:var(--accent);\">{{ fiche.value }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600;\">Part de la CSBM<\u002Fdiv><div class=\"hf-num\" style=\"font-family:'Spectral',serif; font-weight:700; font-size:23px; color:var(--ink);\">{{ fiche.share }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:16px 24px 22px;\">\n          <p style=\"font-size:14px; line-height:1.55; color:var(--ink); margin:0 0 16px;\">{{ fiche.role }}<\u002Fp>\n          <div style=\"font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:7px;\">{{ fiche.connTitle }}<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:4px; margin-bottom:14px;\">\n            <sc-for list=\"{{ fiche.connectors }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:13px; padding:4px 2px; border-bottom:1px solid var(--line);\">\n                <span style=\"display:inline-flex; align-items:center; gap:8px; color:var(--ink); min-width:0;\"><span style=\"{{ c.dot }}\"><\u002Fspan><span style=\"overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ c.label }}<\u002Fspan><\u002Fspan>\n                <span class=\"hf-num\" style=\"color:var(--accent); font-weight:700; flex:none;\">{{ c.value }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:7px;\">Sources<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:5px;\">\n            <sc-for list=\"{{ fiche.sources }}\" as=\"s\" hint-placeholder-count=\"1\"><a href=\"{{ s.url }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size:12.5px; color:var(--accent); text-decoration:none;\">↗ {{ s.label }}<\u002Fa><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ notReady }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:var(--bg); z-index:80;\">\n      <div style=\"text-align:center; color:var(--muted);\"><div style=\"font-family:'Spectral',serif; font-size:18px; color:var(--ink);\">Chargement des comptes de la santé…<\u002Fdiv><div style=\"margin-top:8px; font-size:12px;\">Construction du diagramme de flux<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  \n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    ready: false, W: 1400, H: 720,\n    year: 2023, theme: 'sobre', colorMode: 'neutre', detail: { fin: false, off: false, dest: false }, profession: '',\n    activeFin: null, activeGroup: null, perimetre: 'csbm',\n    hoverNode: null, selected: null,\n    z: 1, px: 0, py: 0, yOver: {},\n  };\n\n  componentDidMount() {\n    this._ro = new ResizeObserver(es => { const r = es[0].contentRect; this.setState({ W: Math.max(900, Math.round(r.width)), H: Math.max(520, Math.round(r.height)) }); });\n    if (this._cont) this._ro.observe(this._cont);\n    window.addEventListener('pointermove', this._onMove);\n    window.addEventListener('pointerup', this._onUp);\n    this._tryInit();\n  }\n  _tryInit = () => {\n    if (window.HF_DATA && window.HF_LAYOUT) { this.D = window.HF_DATA; this.L = window.HF_LAYOUT; this.setState({ ready: true }); }\n    else this._initT = setTimeout(this._tryInit, 30);\n  };\n  componentWillUnmount() {\n    if (this._ro) this._ro.disconnect();\n    window.removeEventListener('pointermove', this._onMove);\n    window.removeEventListener('pointerup', this._onUp);\n    if (this._cont) this._cont.removeEventListener('wheel', this._onWheel);\n  }\n  containerRef = (el) => { this._cont = el; if (el) { if (this._ro) this._ro.observe(el); el.addEventListener('wheel', this._onWheel, { passive: false }); } };\n  rootRef = () => {};\n\n  _onWheel = (e) => {\n    e.preventDefault(); const r = this._cont.getBoundingClientRect();\n    const cx = e.clientX - r.left, cy = e.clientY - r.top, z0 = this.state.z;\n    const z = Math.min(4, Math.max(0.4, z0 * (e.deltaY < 0 ? 1.12 : 0.893))), k = z / z0;\n    this.setState({ z, px: cx - (cx - this.state.px) * k, py: cy - (cy - this.state.py) * k });\n  };\n  _onBgDown = (e) => { this._act = { t: 'pan', x: e.clientX, y: e.clientY, px: this.state.px, py: this.state.py }; };\n  _onNodeDown = (id) => (e) => { e.stopPropagation(); const n = this.graph && this.graph.nodes[id]; this._act = { t: 'node', id, y: e.clientY, oy: n ? n.y : 0 }; this._dragged = false; };\n  _onMove = (e) => {\n    if (!this._act) return;\n    if (this._act.t === 'pan') this.setState({ px: this._act.px + (e.clientX - this._act.x), py: this._act.py + (e.clientY - this._act.y) });\n    else if (this._act.t === 'node') { if (Math.abs(e.clientY - this._act.y) > 3) this._dragged = true; const dy = (e.clientY - this._act.y) / this.state.z; this.setState({ yOver: { ...this.state.yOver, [this._act.id]: this._act.oy + dy } }); }\n  };\n  _onUp = () => { this._act = null; };\n  _onNodeClick = (id) => () => { if (this._dragged) { this._dragged = false; return; } this.setState({ selected: id }); };\n\n  chip(active, accent) {\n    return { fontFamily: \"'Public Sans', sans-serif\", fontSize: '12px', fontWeight: 600, padding: '5px 11px', borderRadius: '7px', cursor: 'pointer', whiteSpace: 'nowrap',\n      border: '1px solid ' + (active ? (accent || 'var(--chipActiveBd)') : 'var(--line)'),\n      back  borderRight: '1px solid var(--line)', background: hl ? 'var(--accentSoft)' : 'transparent' } });\n      kpis = [ kp('CSBM ' + S.year, this.fmt(Y.csbm), 'Soins & biens médicaux'), kp('DCSi', this.fmt(Y.dcsi), 'Dépense courante (large)'), kp('ONDAM', this.fmt(Y.ondam), 'Objectif voté (LFSS)'), kp('Reste à charge', (Y.fin.menages * 100).toFixed(1).replace('.', ',') + ' %', this.fmt(Y.csbm * Y.fin.menages) + ' · ménages'), kp('Importations', '≈ ' + this.fmt(imports), 'Sorties du territoire (estim.)', true) ];\n      const pb = D.PERIMETRES[S.perimetre]; if (S.perimetre !== 'csbm') perimBanner = { title: pb.label + ' — ' + pb.full, note: pb.note };\n      if (S.hoverNode && this.graph && this.graph.nodes[S.hoverNode]) { const n = this.graph.nodes[S.hoverNode]; hoverTip = { name: n.label, value: this.fmt(n.value), sub: '· ' + this.pct(n.value) + ' de la CSBM · cliquez pour la fiche' }; }\n      // légende : familles de couleurs des nœuds + descriptif du mode\n      const sw = c => ({ width: '18px', height: '12px', borderRadius: '3px', background: c, display: 'inline-block', border: '1px solid rgba(0,0,0,.12)' });\n      const md = D.COLOR_MODES.find(m => m.id === S.colorMode);\n      legendTitle = md ? md.desc : 'Couleur des nœuds';\n      legend = [\n        { label: 'AMO + État', swatch: sw(D.FINANCEURS[0].color) },\n        { label: 'AMC', swatch: sw(D.FINANCEURS[1].color) },\n        { label: 'Ménages', swatch: sw(D.FINANCEURS[2].color) },\n        { label: 'Établissements', swatch: sw(D.CATS.hop_pub.color) },\n        { label: 'Professions de ville', swatch: sw(D.CATS.ville.color) },\n        { label: 'Pharma & biens méd.', swatch: sw(D.CATS.medicament.color) },\n        { label: 'Salaires', swatch: sw(D.GROUPS.salaires.color) },\n        { label: 'Revenus libéraux', swatch: sw(D.GROUPS.revenus.color) },\n        { label: 'Charges externes', swatch: sw(D.GROUPS.charges.color) },\n        { label: 'Biens & imports', swatch: sw(D.GROUPS.biens.color) },\n        { labe
